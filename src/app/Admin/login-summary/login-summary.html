<div class="page-container">

  <h2>Login Summary</h2>

  <!-- KPI Cards -->
  <div class="kpi-container">

    <mat-card class="kpi-card">
      <h3>Total Users</h3>
      <p>{{ totalUsers }}</p>
    </mat-card>

    <mat-card class="kpi-card">
      <h3>Total Logins</h3>
      <p>{{ totalLogins }}</p>
    </mat-card>

    <mat-card class="kpi-card">
      <h3>Total Minutes Logged</h3>
      <p>{{ totalMinutes }}</p>
    </mat-card>

  </div>

  <!-- Data Table -->
  <mat-card>
    <table mat-table [dataSource]="data" class="mat-elevation-z2">

      <ng-container matColumnDef="userName">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let row">{{ row.userName }}</td>
      </ng-container>

      <ng-container matColumnDef="totalLogins">
        <th mat-header-cell *matHeaderCellDef>Logins</th>
        <td mat-cell *matCellDef="let row">{{ row.totalLogins }}</td>
      </ng-container>

      <ng-container matColumnDef="totalMinutesLoggedIn">
        <th mat-header-cell *matHeaderCellDef>Minutes</th>
        <td mat-cell *matCellDef="let row">{{ row.totalMinutesLoggedIn }}</td>
      </ng-container>

      <ng-container matColumnDef="lastLoginUtc">
        <th mat-header-cell *matHeaderCellDef>Last Login</th>
        <td mat-cell *matCellDef="let row">
          {{ row.lastLoginUtc | date:'medium' }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  </mat-card>

</div>
