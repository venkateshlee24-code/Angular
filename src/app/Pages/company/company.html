<form [formGroup]="companyForm" (ngSubmit)="submit()">

  <div class="erp-grid">

    <!-- Company Code -->
    <div>
      <label class="erp-label">
        <mat-icon>badge</mat-icon> Company Code
      </label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="companyCode">
      </mat-form-field>
    </div>

    <!-- Company Name -->
    <div>
      <label class="erp-label">
        <mat-icon>apartment</mat-icon> Company Name
      </label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="companyName">
      </mat-form-field>
    </div>

    <!-- Base Currency -->
    <div>
      <label class="erp-label">
        <mat-icon>currency_exchange</mat-icon> Base Currency
      </label>
      <mat-form-field appearance="outline">
        <mat-select formControlName="baseCurrencyId">
          <mat-option value="1">INR</mat-option>
          <mat-option value="2">USD</mat-option>
          <mat-option value="3">EUR</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Created By -->
    <div>
      <label class="erp-label">
        <mat-icon>person</mat-icon> Created By
      </label>
      <mat-form-field appearance="outline">
        <input matInput type="number" formControlName="createdBy">
      </mat-form-field>
    </div>

  </div>

  <!-- Buttons -->
  <div class="erp-footer mt-3 mb-3">
    <button mat-stroked-button color="" type="button">
      <mat-icon>close</mat-icon> Cancel
    </button>

    <button mat-raised-button color="" type="submit">
      <mat-icon>save</mat-icon> Save Company
    </button>
  </div>

</form>
<!-- ================= COMPANY LIST ================= -->

<div class="mat-table-wrapper mt-5">

  <h3 class="table-title">
    <mat-icon>business</mat-icon>
    Company List
  </h3>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

    <!-- Position -->
    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let element; let i = index">
        {{ i + 1 }}
      </td>
    </ng-container>

    <!-- Company Code -->
    <ng-container matColumnDef="companyCode">
      <th mat-header-cell *matHeaderCellDef>Company Code</th>
      <td mat-cell *matCellDef="let element">
        <mat-icon class="text-primary me-1">badge</mat-icon>
        {{ element.companyCode }}
      </td>
    </ng-container>

    <!-- Company Name -->
    <ng-container matColumnDef="companyName">
      <th mat-header-cell *matHeaderCellDef>Company Name</th>
      <td mat-cell *matCellDef="let element">
        <mat-icon class="text-success me-1">apartment</mat-icon>
        {{ element.companyName }}
      </td>
    </ng-container>

    <!-- Currency -->
    <ng-container matColumnDef="currency">
      <th mat-header-cell *matHeaderCellDef>Currency</th>
      <td mat-cell *matCellDef="let element">
        {{ element.baseCurrencyId }}
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">
        <mat-chip
          [color]="element.isActive ? 'primary' : 'warn'"
          selected>
          {{ element.isActive ? 'Active' : 'Inactive' }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">

        <button mat-icon-button color="primary">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button color="warn">
          <mat-icon>delete</mat-icon>
        </button>

      </td>
    </ng-container>

    <!-- Header & Row -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
