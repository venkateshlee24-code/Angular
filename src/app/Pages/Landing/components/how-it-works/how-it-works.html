<section class="how-it-works-section bg-gray-50 py-16">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Section header -->
    <div class="text-center mb-12" data-aos="fade-up">
      <h2 class="text-4xl md:text-5xl font-bold mb-3">How It Works</h2>
      <p class="text-lg text-gray-500">Simple Steps to Smarter HR<br>Get started in minutes and see results that matter.</p>
    </div>

    <!-- Steps grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div *ngFor="let step of steps; let i = index" 
           class="step-card text-center p-6 bg-white rounded-2xl shadow-sm border border-gray-100 transition-all duration-300 hover:-translate-y-1 hover:shadow-md"
           data-aos="fade-up" [attr.data-aos-delay]="i * 150">
        
        <!-- Step number with icon -->
        <div class="step-number inline-flex items-center gap-1 bg-blue-100 text-blue-700 text-sm font-bold px-3 py-1 rounded-full mb-3">
          <i class="bi bi-{{ step.icon.split('-')[1] }}-circle-fill text-blue-600" style="font-size: 1rem;"></i>
          <span>{{ step.step }}</span>
        </div>

        <!-- Main icon -->
        <div class="step-icon w-20 h-20 bg-gradient-to-br from-blue-50 to-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="bi {{ step.icon }} text-4xl text-blue-600"></i>
        </div>

        <h3 class="text-xl font-bold mb-2">{{ step.title }}</h3>
        <p class="text-gray-500">{{ step.description }}</p>

        <!-- Optional small arrow icon -->
        <div class="mt-4">
          <i class="bi bi-arrow-right-circle text-blue-400 text-xl"></i>
        </div>
      </div>
    </div>
  </div>
</section>
