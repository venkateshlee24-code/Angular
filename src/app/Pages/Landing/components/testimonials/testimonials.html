<!-- src/app/Pages/Landing/components/testimonials/testimonials.component.html -->
<section class="testimonials-section">
  <div class="container">
    <div class="text-center mb-5" data-aos="fade-up">
      <h2 class="display-5 fw-bold mb-3">Customer Stories</h2>
      <p class="lead text-secondary">Loved by HR Leaders Worldwide</p>
    </div>
    <div class="row g-4">
      <div class="col-md-6 col-lg-4" *ngFor="let testimonial of testimonials; let i = index" data-aos="fade-up" [attr.data-aos-delay]="i * 100">
        <div class="testimonial-card h-100 p-4 border rounded-4 shadow-sm bg-white">
          <i class="bi bi-quote fs-1 text-primary opacity-25"></i>
          <p class="lead mb-4">{{ testimonial.quote }}</p>
          <div class="d-flex align-items-center gap-3">
            <div class="avatar bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
              <span class="fw-bold text-primary">{{ testimonial.avatar }}</span>
            </div>
            <div>
              <div class="fw-bold">{{ testimonial.name }}</div>
              <div class="small text-secondary">{{ testimonial.role }}, {{ testimonial.company }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
