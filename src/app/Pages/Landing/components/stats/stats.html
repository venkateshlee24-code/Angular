<section class="stats-section bg-primary text-white">
  <div class="container">
    <div class="row g-4 text-center">
      <div class="col-md-6 col-lg-3" *ngFor="let stat of stats" data-aos="zoom-in">
        <div class="stat-item">
          <!-- Bootstrap Icon -->
          <i class="bi {{ stat.bootstrapIcon }} fs-2 mb-2 d-block"></i>
          <!-- Optional: Use Material Icon instead or in addition -->
          <!-- <mat-icon class="material-icons mb-2" style="font-size: 2.5rem;">{{ stat.materialIcon }}</mat-icon> -->
          <div class="display-4 fw-bold mb-2">{{ stat.value }}</div>
          <div class="text-uppercase small fw-semibold opacity-75">{{ stat.label }}</div>
          <div class="small text-white-50">{{ stat.suffix }}</div>
        </div>
      </div>
    </div>
  </div>
</section>
