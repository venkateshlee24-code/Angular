<!-- src/app/Pages/Landing/components/clients/clients.component.html -->
<section class="clients-section bg-light py-4">
  <div class="container">
    <p class="text-center text-muted text-uppercase small fw-semibold mb-4">
      {{ trustedBy }}
    </p>
    <div class="row g-4 align-items-center justify-content-center">
      <div class="col-6 col-md-4 col-lg-2 text-center" *ngFor="let client of clients">
        <div class="client-logo p-3">
          <span class="fw-bold text-secondary">{{ client }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
