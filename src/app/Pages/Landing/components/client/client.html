<section class="clients-section bg-light py-5">
  <div class="container">
    <!-- Section header with icons -->
    <div class="text-center mb-5">
      <div class="d-flex align-items-center justify-content-center gap-3 mb-2">
        <i class="bi bi-building fs-5 text-primary opacity-75"></i>
        <span class="text-muted text-uppercase small fw-semibold tracking-wide">{{ trustedBy }}</span>
        <i class="bi bi-building fs-5 text-primary opacity-75"></i>
      </div>
      <div class="position-relative mx-auto" style="width: 60px; height: 2px;">
        <div class="bg-primary w-100 h-100" style="opacity: 0.3;"></div>
      </div>
    </div>

    <!-- Client logos grid with icons -->
    <div class="row g-4 align-items-center justify-content-center">
      <div class="col-6 col-md-4 col-lg-2 text-center" *ngFor="let client of clients">
        <div class="client-logo-card p-3">
          <i class="bi bi-building fs-5 text-primary mb-2 d-block"></i>
          <span class="client-name">{{ client }}</span>
          <div class="mt-2">
            <i class="bi bi-check-circle-fill text-success small" style="font-size: 0.7rem;"></i>
            <i class="bi bi-check-circle-fill text-success small ms-1" style="font-size: 0.7rem;"></i>
            <i class="bi bi-check-circle-fill text-success small ms-1" style="font-size: 0.7rem;"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
