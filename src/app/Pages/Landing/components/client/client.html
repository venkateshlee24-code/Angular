<section class="clients-section bg-gray-50 py-12">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Section header with icons -->
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-3 mb-2">
        <i class="bi bi-building text-blue-600 opacity-75 text-lg"></i>
        <span class="text-gray-500 uppercase text-xs font-semibold tracking-wide">{{ trustedBy }}</span>
        <i class="bi bi-building text-blue-600 opacity-75 text-lg"></i>
      </div>
      <div class="relative mx-auto w-16 h-0.5">
        <div class="absolute inset-0 bg-blue-600 opacity-30"></div>
      </div>
    </div>

    <!-- Client logos grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 items-center">
      <div *ngFor="let client of clients" class="text-center">
        <div class="client-logo-card bg-white rounded-xl p-4 shadow-sm border border-gray-100 hover:shadow-md transition-all duration-200 hover:-translate-y-1">
          <i class="bi bi-building text-blue-600 text-xl block mb-2"></i>
          <span class="client-name font-semibold text-sm text-gray-800 block">{{ client }}</span>
          <div class="mt-2 flex justify-center gap-1">
            <i class="bi bi-check-circle-fill text-green-500 text-xs"></i>
            <i class="bi bi-check-circle-fill text-green-500 text-xs"></i>
            <i class="bi bi-check-circle-fill text-green-500 text-xs"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
