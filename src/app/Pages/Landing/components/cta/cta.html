<section class="cta-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center" data-aos="fade-up">
        <!-- Icon above heading -->
        <div class="mb-2">
          <i class="bi bi-rocket-takeoff fs-3 text-primary"></i>
        </div>

        <h2 class="h3 fw-bold mb-3">Ready to Transform Your HR Operations?</h2>

        <p class="mb-3 text-secondary">
          <i class="bi bi-people-fill me-1 text-primary"></i>
          Join 500+ enterprises that trust PeopleFlow to empower their people.
        </p>

        <div class="d-flex flex-wrap gap-2 justify-content-center mb-3">
          <div class="badge bg-light text-dark p-2">
            <i class="bi bi-credit-card me-1"></i> No credit card
          </div>
          <div class="badge bg-light text-dark p-2">
            <i class="bi bi-calendar-week me-1"></i> 14-day free trial
          </div>
          <div class="badge bg-light text-dark p-2">
            <i class="bi bi-stars me-1"></i> Full feature access
          </div>
        </div>

        <button class="btn btn-primary px-4 py-2" (click)="onStartFreeTrial()">
          Start Free Trial <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </div>
    </div>
  </div>
</section>
