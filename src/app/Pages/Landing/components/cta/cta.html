<!-- src/app/Pages/Landing/components/cta/cta.component.html -->
<section class="cta-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center" data-aos="fade-up">
        <h2 class="display-5 fw-bold mb-4">Ready to Transform Your HR Operations?</h2>
        <p class="lead mb-4">Join 500+ enterprises that trust PeopleFlow to empower their people.</p>
        <div class="d-flex flex-wrap gap-3 justify-content-center mb-4">
          <div class="badge bg-primary bg-opacity-10 text-primary p-3">
            <i class="bi bi-credit-card"></i> No credit card required
          </div>
          <div class="badge bg-primary bg-opacity-10 text-primary p-3">
            <i class="bi bi-calendar-week"></i> 14-day free trial
          </div>
          <div class="badge bg-primary bg-opacity-10 text-primary p-3">
            <i class="bi bi-stars"></i> Full feature access
          </div>
        </div>
        <button class="btn btn-primary btn-lg px-5" (click)="onStartFreeTrial()">
          Start Free Trial <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </div>
    </div>
  </div>
</section>
