<section class="cta-section py-16 bg-gradient-to-br from-gray-50 to-white">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto text-center" data-aos="fade-up">
      <!-- Icon above heading -->
      <div class="mb-3">
        <i class="bi bi-rocket-takeoff text-3xl text-blue-600"></i>
      </div>

      <h2 class="text-2xl md:text-3xl font-bold mb-3">Ready to Transform Your HR Operations?</h2>

      <p class="text-gray-600 mb-4">
        <i class="bi bi-people-fill me-1 text-blue-600"></i>
        Join 500+ enterprises that trust PeopleFlow to empower their people.
      </p>

      <!-- Badges -->
      <div class="flex flex-wrap gap-2 justify-center mb-4">
        <div class="bg-gray-100 text-gray-800 rounded-full px-3 py-1.5 text-sm font-medium flex items-center gap-1">
          <i class="bi bi-credit-card"></i> No credit card
        </div>
        <div class="bg-gray-100 text-gray-800 rounded-full px-3 py-1.5 text-sm font-medium flex items-center gap-1">
          <i class="bi bi-calendar-week"></i> 14-day free trial
        </div>
        <div class="bg-gray-100 text-gray-800 rounded-full px-3 py-1.5 text-sm font-medium flex items-center gap-1">
          <i class="bi bi-stars"></i> Full feature access
        </div>
      </div>

      <!-- Button -->
      <button class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-lg transition flex items-center gap-1 mx-auto" (click)="onStartFreeTrial()">
        Start Free Trial <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </div>
</section>
