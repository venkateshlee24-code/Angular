<div class="container-fluid">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Employees</h3>

    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Add Employee
    </button>
  </div>

  <!-- SEARCH -->
  <mat-form-field appearance="outline" class="w-100 mb-3">
    <mat-label>Search</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput placeholder="Search employee">
  </mat-form-field>

  <!-- TABLE -->
  <div class="mat-elevation-z2">

    <table mat-table [dataSource]="employees" class="w-100">

      <!-- Code -->
      <ng-container matColumnDef="employeeCode">
        <th mat-header-cell *matHeaderCellDef> Code </th>
        <td mat-cell *matCellDef="let e"> {{e.employeeCode}} </td>
      </ng-container>

      <!-- Name -->
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let e"> {{e.fullName}} </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let e"> {{e.email}} </td>
      </ng-container>

      <!-- Department -->
      <ng-container matColumnDef="departmentCode">
        <th mat-header-cell *matHeaderCellDef> Dept </th>
        <td mat-cell *matCellDef="let e"> {{e.departmentCode}} </td>
      </ng-container>

      <!-- Date -->
      <ng-container matColumnDef="joiningDate">
        <th mat-header-cell *matHeaderCellDef> Joining </th>
        <td mat-cell *matCellDef="let e"> {{e.joiningDate}} </td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let e">
          <span class="badge"
                [ngClass]="e.isActive ? 'bg-success' : 'bg-danger'">
            {{ e.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <!-- PAGINATION -->
    <mat-paginator
      [length]="total"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10,20,50]"
      (page)="onPageChange($event)">
    </mat-paginator>

  </div>

</div>
