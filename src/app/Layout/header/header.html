<nav
  class="bg-blue-600 text-white h-16 md:h-20 fixed top-0 left-0 w-full z-50 shadow-md flex items-center px-4 md:px-6"
>
  <!-- Hamburger Menu Button -->
  <button (click)="toggleMenu()" class="p-2 rounded-md hover:bg-blue-700 transition">
    <i class="bi bi-list text-2xl"></i>
  </button>
  <div class="p-4 border-b border-gray-100">
    <div class="flex items-center gap-2">
      <span class="text-white font-bold text-lg">PeopleFlow HRMS</span>
    </div>
  </div>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Theme Switcher Dropdown -->
  <!-- User Menu Dropdown -->
  <div class="relative">
    <button
      (click)="toggleUserMenu()"
      class="flex items-center gap-1 p-2 rounded-md hover:bg-blue-700 transition"
    >
      <i class="bi bi-person-circle text-2xl"></i>
      <span class="hidden sm:inline text-sm">Account</span>
      <i
        class="bi bi-chevron-down text-sm transition-transform"
        [class.rotate-180]="userMenuOpen"
      ></i>
    </button>

    <!-- User dropdown menu -->
    <div
      *ngIf="userMenuOpen"
      class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50"
    >
      <button
        (click)="goToProfile()"
        class="flex items-center gap-2 w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
      >
        <i class="bi bi-person"></i> Profile
      </button>
      <button
        (click)="logout()"
        class="flex items-center gap-2 w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
      >
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </div>
  </div>
</nav>

<!-- Click outside overlay (closes both dropdowns) -->
<div
  *ngIf="userMenuOpen || themeMenuOpen"
  class="fixed inset-0 z-40"
  (click)="closeAllMenus()"
></div>
