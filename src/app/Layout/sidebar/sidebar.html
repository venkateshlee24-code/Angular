<aside class="bg-white shadow-sm h-full flex flex-col transition-all duration-300 overflow-y-auto"
       [class.w-64]="!collapsed"
       [class.w-20]="collapsed">

  <!-- Logo -->
 

  <!-- Navigation -->
  <nav class="flex-1 py-4 space-y-1">
    <a routerLink="/dashboard"
       class="flex items-center px-4 py-2 text-black-700 hover:bg-gray-100 transition"
       [class.justify-center]="collapsed"
       [class.gap-0]="collapsed">
      <mat-icon class="text-xl">dashboard</mat-icon>
      <span *ngIf="!collapsed" class="ml-3">Dashboard</span>
    </a>
    <a routerLink="/upload"
       class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition"
       [class.justify-center]="collapsed">
      <mat-icon class="text-xl">upload</mat-icon>
      <span *ngIf="!collapsed" class="ml-3">Upload</span>
    </a>
    <a routerLink="/parser"
       class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition"
       [class.justify-center]="collapsed">
      <mat-icon class="text-xl">layout</mat-icon>
      <span *ngIf="!collapsed" class="ml-3">Layout</span>
    </a>
    <a routerLink="/company"
       class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition"
       [class.justify-center]="collapsed">
      <mat-icon class="text-xl">people</mat-icon>
      <span *ngIf="!collapsed" class="ml-3">Company</span>
    </a>
    <a routerLink="/attendance"
       class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition"
       [class.justify-center]="collapsed">
      <mat-icon class="text-xl">event</mat-icon>
      <span *ngIf="!collapsed" class="ml-3">Attendance</span>
    </a>
    <a routerLink="/ap-invoices"
       class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition"
       [class.justify-center]="collapsed">
      <mat-icon class="text-xl">receipt_long</mat-icon>
      <span *ngIf="!collapsed" class="ml-3">AP Invoices</span>
    </a>
    <a routerLink="/admin"
       class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition"
       [class.justify-center]="collapsed">
      <mat-icon class="text-xl">settings</mat-icon>
      <span *ngIf="!collapsed" class="ml-3">Admin</span>
    </a>
  </nav>

  <!-- Bottom: Request Leave section -->
  <div class="p-4 border-t border-gray-100" *ngIf="!collapsed">
    <div class="bg-blue-50 rounded-xl p-3 text-center">
      <p class="text-sm font-semibold text-gray-800">Need time off?</p>
      <p class="text-xs text-gray-500 mt-1">Request leaves in just a few clicks.</p>
      <button class="mt-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1.5 rounded-full">
        Request Leave
      </button>
    </div>
  </div>
  <div class="p-4 border-t border-gray-100 flex justify-center" *ngIf="collapsed">
    <button class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
      <mat-icon class="text-white text-sm">event_note</mat-icon>
    </button>
  </div>
</aside>
